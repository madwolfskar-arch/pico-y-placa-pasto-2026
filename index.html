<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pico y Placa Pasto 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .v-verde { background-color: #00a651; }
        .v-gris { background-color: #ffffff; color: #333; border: 1px solid #ddd; }
        .v-rojo { background-color: #ed1c24; }
        .v-amarillo { background-color: #fff200; color: #000; }
        .v-azul { background-color: #00aeef; }
        .v-ninguno { background-color: #f3f4f6; color: #9ca3af; }
        
        .badge { @apply px-2 py-0.5 rounded font-bold text-white text-xs; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <div class="max-w-md mx-auto min-h-screen bg-white shadow-sm">
        <!-- HEADER -->
        <header class="p-4 border-b">
            <h1 class="text-xl font-bold text-gray-900">Pico y placa <span class="text-blue-600 font-black">particulares</span> en Pasto</h1>
            <p id="fecha-actual-header" class="text-sm text-gray-500 font-medium"></p>
            <p class="text-[11px] text-gray-400 mt-1 leading-tight">
                Se restringe la circulación de vehículos particulares según el último dígito del número de la placa.
            </p>
        </header>

        <!-- CARD ESTADO ACTUAL (HOY) -->
        <section class="p-4 bg-white">
            <div id="card-hoy" class="rounded-3xl p-8 flex flex-col items-center justify-center text-center shadow-sm border border-gray-100 bg-emerald-50">
                <div class="text-5xl mb-2">🚗</div>
                <p class="text-gray-500 font-bold text-sm">Hoy <span id="dia-nombre-hoy"></span></p>
                <p id="fecha-iso-hoy" class="text-gray-400 text-xs mb-3"></p>
                <h2 id="estado-hoy" class="text-2xl font-black text-emerald-600 uppercase tracking-tight">NO hay restricción</h2>
                <span class="mt-2 px-4 py-1 bg-white border border-emerald-200 rounded-full text-emerald-700 text-xs font-black">No aplica</span>
            </div>
        </section>

        <!-- LISTADO SEMANAL (ROTACIÓN SEGÚN FOTO) -->
        <section class="px-4 pb-8">
            <div class="space-y-1">
                <div id="lista-semanal">
                    <!-- Los días se generan dinámicamente según la lógica de la foto -->
                </div>
            </div>

            <button class="w-full mt-6 py-3 text-blue-600 font-bold text-sm flex items-center justify-center gap-1 border-t border-gray-100">
                <span>↓ Ver más días</span>
            </button>
        </section>
    </div>

    <script>
        // Lógica de datos basada estrictamente en la fotografía "calendario pico y placa 2026 _3.jpg"
        const pyp2026 = {
            "2026-05-03": { placas: "No aplica", label: "domingo", color: "v-ninguno" },
            "2026-05-04": { placas: "8-9", label: "lunes", color: "v-azul" },
            "2026-05-05": { placas: "0-1", label: "martes", color: "v-verde" },
            "2026-05-06": { placas: "2-3", label: "miércoles", color: "v-gris" },
            "2026-05-07": { placas: "4-5", label: "jueves", color: "v-rojo" },
            "2026-05-08": { placas: "6-7", label: "viernes", color: "v-amarillo" },
            "2026-05-09": { placas: "No aplica", label: "sábado", color: "v-ninguno" },
            "2026-05-10": { placas: "No aplica", label: "domingo", color: "v-ninguno" }
        };

        function render() {
            const hoyKey = "2026-05-03";
            const hoyData = pyp2026[hoyKey];

            // Actualizar Header y Card Principal
            document.getElementById('fecha-actual-header').innerText = "Hoy domingo, 3 de mayo de 2026";
            document.getElementById('dia-nombre-hoy').innerText = hoyData.label;
            document.getElementById('fecha-iso-hoy').innerText = hoyKey;

            // Generar lista semanal
            const lista = document.getElementById('lista-semanal');
            const diasProximos = Object.keys(pyp2026).slice(1); // De lunes en adelante

            diasProximos.forEach((key, index) => {
                const item = pyp2026[key];
                const isManana = index === 0;
                
                const div = document.createElement('div');
                div.className = "flex items-center justify-between py-3 border-b border-gray-50 last:border-0";
                
                div.innerHTML = `
                    <div class="flex flex-col">
                        <span class="${isManana ? 'text-blue-600 font-black' : 'text-gray-800 font-bold'} text-sm capitalize">
                            ${isManana ? 'Mañana ' + item.label : item.label}
                        </span>
                        <span class="text-[10px] text-gray-400 font-medium">${key}</span>
                    </div>
                    <div class="flex items-center">
                        ${item.placas === "No aplica" 
                            ? `<span class="text-xs font-bold text-gray-400">No aplica</span>`
                            : `<span class="px-3 py-1 rounded-md font-black text-white text-sm shadow-sm ${item.color} ${item.color === 'v-gris' ? 'text-gray-800' : ''}">${item.placas}</span>`
                        }
                    </div>
                `;
                lista.appendChild(div);
            });
        }

        window.onload = render;
    </script>
</body>
</html>
