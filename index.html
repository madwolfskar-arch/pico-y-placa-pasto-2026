<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pico y Placa Pasto 2026 - Extendido</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Paleta de colores con alto contraste basada en la fotografía */
        .v-verde { background-color: #00813d; color: white; } /* Verde más oscuro para contraste */
        .v-gris { background-color: #d1d5db; color: #111827; } /* Gris plata en lugar de blanco */
        .v-rojo { background-color: #c8102e; color: white; }
        .v-amarillo { background-color: #facc15; color: #111827; }
        .v-azul { background-color: #0077b6; color: white; }
        .v-ninguno { background-color: #f3f4f6; color: #9ca3af; }
        
        .hidden-days { display: none; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <div class="max-w-md mx-auto min-h-screen bg-white shadow-xl">
        <!-- HEADER -->
        <header class="p-6 border-b bg-white sticky top-0 z-10">
            <h1 class="text-xl font-bold text-gray-900 leading-tight">Pico y placa <span class="text-blue-600 font-black italic text-2xl">particulares</span> en Pasto</h1>
            <p class="text-sm text-gray-500 font-bold mt-1">Hoy domingo, 3 de mayo de 2026</p>
            <p class="text-[11px] text-gray-400 mt-2">Restricción por último dígito de placa según calendario oficial.</p>
        </header>

        <!-- CARD HOY -->
        <section class="p-4">
            <div class="rounded-3xl p-6 flex flex-col items-center justify-center text-center bg-emerald-50 border border-emerald-100">
                <div class="text-5xl mb-2">🚗</div>
                <p class="text-gray-500 font-bold text-xs uppercase tracking-widest">Hoy domingo</p>
                <p class="text-gray-400 text-[10px] mb-2">2026-05-03</p>
                <h2 class="text-2xl font-black text-emerald-700">NO HAY RESTRICCIÓN</h2>
                <span class="mt-3 px-6 py-1 bg-white border border-emerald-200 rounded-full text-emerald-700 text-xs font-black shadow-sm">No aplica</span>
            </div>
        </section>

        <!-- LISTADO DE DÍAS (ROTACIÓN DE LA FOTO) -->
        <section class="px-6 pb-6">
            <div id="lista-pyp" class="divide-y divide-gray-100">
                <!-- Se inyecta vía JS -->
            </div>

            <button id="btn-ver-mas" onclick="mostrarMasDias()" class="w-full mt-4 py-4 text-blue-600 font-black text-sm flex items-center justify-center gap-2 hover:bg-blue-50 transition-colors rounded-xl border-2 border-dashed border-blue-100">
                <span id="btn-texto">↓ Ver más días</span>
            </button>
        </section>
    </div>

    <script>
        // Datos extraídos de la fotografía[cite: 1]
        const calendarioMayo = [
            { fecha: "2026-05-04", dia: "lunes", placas: "8-9", col: "v-azul" },
            { fecha: "2026-05-05", dia: "martes", placas: "0-1", col: "v-verde" },
            { fecha: "2026-05-06", dia: "miércoles", placas: "2-3", col: "v-gris" },
            { fecha: "2026-05-07", dia: "jueves", placas: "4-5", col: "v-rojo" },
            { fecha: "2026-05-08", dia: "viernes", placas: "6-7", col: "v-amarillo" },
            { fecha: "2026-05-09", dia: "sábado", placas: "No aplica", col: "v-ninguno" },
            { fecha: "2026-05-10", dia: "domingo", placas: "No aplica", col: "v-ninguno" },
            { fecha: "2026-05-11", dia: "lunes", placas: "0-1", col: "v-verde" },
            { fecha: "2026-05-12", dia: "martes", placas: "2-3", col: "v-gris" },
            { fecha: "2026-05-13", dia: "miércoles", placas: "4-5", col: "v-rojo" },
            { fecha: "2026-05-14", dia: "jueves", placas: "6-7", col: "v-amarillo" },
            { fecha: "2026-05-15", dia: "viernes", placas: "8-9", col: "v-azul" },
            { fecha: "2026-05-16", dia: "sábado", placas: "No aplica", col: "v-ninguno" },
            { fecha: "2026-05-17", dia: "domingo", placas: "No aplica", col: "v-ninguno" }
        ];

        let extendido = false;

        function renderLista() {
            const contenedor = document.getElementById('lista-pyp');
            contenedor.innerHTML = "";

            calendarioMayo.forEach((item, index) => {
                const esManana = index === 0;
                const esOculto = index > 6;
                
                const div = document.createElement('div');
                div.className = `flex items-center justify-between py-4 ${esOculto ? 'hidden-days' : ''}`;
                
                div.innerHTML = `
                    <div class="flex flex-col">
                        <span class="${esManana ? 'text-blue-600 font-black' : 'text-gray-800 font-bold'} text-sm capitalize">
                            ${esManana ? 'Mañana ' + item.dia : item.dia}
                        </span>
                        <span class="text-[10px] text-gray-400 font-medium tracking-wide">${item.fecha}</span>
                    </div>
                    <div>
                        ${item.placas === "No aplica" 
                            ? `<span class="text-xs font-bold text-gray-300">No aplica</span>`
                            : `<span class="px-4 py-1.5 rounded-lg font-black text-sm shadow-md block text-center min-w-[60px] ${item.col}">${item.placas}</span>`
                        }
                    </div>
                `;
                contenedor.appendChild(div);
            });
        }

        function mostrarMasDias() {
            const ocultos = document.querySelectorAll('.hidden-days');
            const btnTexto = document.getElementById('btn-texto');
            
            if (!extendido) {
                ocultos.forEach(el => el.style.display = 'flex');
                btnTexto.innerText = "↑ Ver menos días";
                extendido = true;
            } else {
                ocultos.forEach(el => el.style.display = 'none');
                btnTexto.innerText = "↓ Ver más días";
                extendido = false;
            }
        }

        window.onload = renderLista;
    </script>
</body>
</html>
