<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pico y Placa Pasto - Consulta Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .verde { background-color: #00a651; }
        .gris { background-color: #333333; }
        .rojo { background-color: #ed1c24; }
        .amarillo { background-color: #fff200; }
        .azul { background-color: #00aeef; }
        .placa-badge { font-weight: 900; padding: 2px 8px; border-radius: 4px; color: white; }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <!-- HEADER ESTILO PYPHOY -->
    <nav class="bg-white shadow-md p-4 sticky top-0 z-50">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <h1 class="font-black text-xl text-blue-900">PYP<span class="text-blue-500">PASTO</span></h1>
            <div class="flex flex-col items-end">
                <span id="fecha-actual" class="text-[10px] font-bold text-gray-400 uppercase"></span>
                <span class="text-xs font-bold text-blue-600">PARTICULARES 2026</span>
            </div>
        </div>
    </nav>

    <main class="max-w-xl mx-auto p-4 space-y-4">
        
        <!-- SELECTOR DE PLACA -->
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-200 text-center">
            <p class="text-gray-500 font-bold text-sm mb-3">¿CUÁL ES EL ÚLTIMO DÍGITO DE TU PLACA?</p>
            <div class="flex justify-center gap-2 flex-wrap">
                <template id="placa-btn-template">
                    <button onclick="seleccionarPlaca(this)" class="w-10 h-10 rounded-lg border-2 border-gray-200 font-black text-gray-700 hover:border-blue-500 hover:bg-blue-50 transition-all"></button>
                </template>
                <div id="placa-container" class="flex justify-center gap-2 flex-wrap"></div>
            </div>
        </div>

        <!-- ESTADO HOY -->
        <div id="card-hoy" class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-200">
            <div class="bg-gray-50 px-4 py-2 border-b border-gray-100 flex justify-between">
                <span class="font-black text-xs text-gray-400">ESTADO HOY</span>
                <span id="label-hoy" class="text-xs font-bold"></span>
            </div>
            <div class="p-6 text-center">
                <div id="status-icon-hoy" class="text-5xl mb-2"></div>
                <h2 id="msg-hoy" class="text-2xl font-black leading-tight"></h2>
                <p id="desc-hoy" class="text-sm text-gray-500 mt-1"></p>
                <div id="pyp-hoy" class="mt-4 flex justify-center gap-2"></div>
            </div>
        </div>

        <!-- ESTADO MAÑANA -->
        <div id="card-manana" class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-200 opacity-80">
            <div class="bg-gray-50 px-4 py-2 border-b border-gray-100 flex justify-between">
                <span class="font-black text-xs text-gray-400">ESTADO MAÑANA</span>
                <span id="label-manana" class="text-xs font-bold text-gray-400"></span>
            </div>
            <div class="p-4 flex items-center gap-4">
                <div id="status-icon-manana" class="text-3xl"></div>
                <div>
                    <h3 id="msg-manana" class="font-black text-lg"></h3>
                    <div id="pyp-manana" class="flex gap-1"></div>
                </div>
            </div>
        </div>

        <!-- LEYENDA -->
        <div class="grid grid-cols-5 gap-1 text-[10px] font-bold text-center uppercase">
            <div class="p-1 rounded verde text-white">0-1</div>
            <div class="p-1 rounded gris text-white">2-3</div>
            <div class="p-1 rounded rojo text-white">4-5</div>
            <div class="p-1 rounded amarillo text-black">6-7</div>
            <div class="p-1 rounded azul text-white">8-9</div>
        </div>
    </main>

    <script>
        // Mapeo dinámico de rotación semanal según tu DB
        // Se definen los colores restringidos por día para Mayo 2026
        const pypData = {
            "2026-05-01": "g", "2026-05-02": "g", "2026-05-03": "g",
            "2026-05-04": "z", "2026-05-05": "v", "2026-05-06": "g", "2026-05-07": "r", "2026-05-08": "a",
            "2026-05-09": "g", "2026-05-10": "g", "2026-05-11": "v", "2026-05-12": "g", "2026-05-13": "r",
            "2026-05-14": "a", "2026-05-15": "z", "2026-05-16": "g", "2026-05-17": "g", "2026-05-18": "r",
            "2026-05-19": "a", "2026-05-20": "z", "2026-05-21": "v", "2026-05-22": "g", "2026-05-23": "g",
            "2026-05-24": "g", "2026-05-25": "r", "2026-05-26": "a", "2026-05-27": "z", "2026-05-28": "v", "2026-05-29": "g"
        };

        const config = {
            "v": { name: "Verde", digits: [0, 1], class: "verde" },
            "g": { name: "Gris", digits: [2, 3], class: "gris" },
            "r": { name: "Rojo", digits: [4, 5], class: "rojo" },
            "a": { name: "Amarillo", digits: [6, 7], class: "amarillo" },
            "z": { name: "Azul", digits: [8, 9], class: "azul" }
        };

        let placaSeleccionada = 0;

        function init() {
            const container = document.getElementById('placa-container');
            const temp = document.getElementById('placa-btn-template');
            for(let i=0; i<=9; i++) {
                const clone = temp.content.cloneNode(true);
                const btn = clone.querySelector('button');
                btn.textContent = i;
                btn.dataset.val = i;
                container.appendChild(clone);
            }
            actualizarInterfaz();
        }

        function seleccionarPlaca(btn) {
            document.querySelectorAll('#placa-container button').forEach(b => b.classList.remove('bg-blue-600', 'text-white', 'border-blue-600'));
            btn.classList.add('bg-blue-600', 'text-white', 'border-blue-600');
            placaSeleccionada = parseInt(btn.dataset.val);
            actualizarInterfaz();
        }

        function actualizarInterfaz() {
            const hoy = new Date();
            const manana = new Date();
            manana.setDate(hoy.getDate() + 1);

            procesarDia(hoy, "hoy");
            procesarDia(manana, "manana");
            
            document.getElementById('fecha-actual').textContent = hoy.toLocaleDateString('es-CO', { weekday:'long', day:'numeric', month:'short' });
        }

        function procesarDia(fecha, idPrefix) {
            const key = fecha.toISOString().split('T')[0];
            const codigoColor = pypData[key] || "g"; 
            const datosColor = config[codigoColor];
            const tienePyp = datosColor.digits.includes(placaSeleccionada);
            
            const msg = document.getElementById(`msg-${idPrefix}`);
            const icon = document.getElementById(`status-icon-${idPrefix}`);
            const pypList = document.getElementById(`pyp-${idPrefix}`);
            const label = document.getElementById(`label-${idPrefix}`);

            label.textContent = fecha.toLocaleDateString('es-CO', { day:'numeric', month:'short' });

            if (codigoColor === "g" && (fecha.getDay() === 0 || fecha.getDay() === 6)) {
                msg.textContent = "SIN RESTRICCIÓN";
                msg.className = "text-2xl font-black text-green-500";
                icon.innerHTML = "✅";
                pypList.innerHTML = `<span class="text-[10px] font-bold text-gray-400 uppercase">Fin de semana libre</span>`;
            } else if (tienePyp) {
                msg.textContent = "TIENES RESTRICCIÓN";
                msg.className = "text-2xl font-black text-red-600";
                icon.innerHTML = "🚫";
                pypList.innerHTML = `<span class="placa-badge ${datosColor.class}">${datosColor.digits.join(' - ')}</span>`;
            } else {
                msg.textContent = "PUEDES CIRCULAR";
                msg.className = "text-2xl font-black text-green-500";
                icon.innerHTML = "🚗";
                pypList.innerHTML = `<span class="text-[10px] font-bold text-gray-400 uppercase text-center">Restricción para:<br><span class="placa-badge ${datosColor.class}">${datosColor.digits.join(' - ')}</span></span>`;
            }
        }

        init();
    </script>
</body>
</html>
