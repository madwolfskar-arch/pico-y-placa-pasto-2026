<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pico y Placa Pasto 2026</title>
    <style>
        :root {
            --primary: #2c3e50;
            --green: #27ae60; 
            --brown: #6e4b3a; 
            --red: #e74c3c; 
            --yellow: #f1c40f; 
            --blue: #3498db;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        h1 { margin: 0; color: var(--primary); }
        .fecha-hoy { color: #7f8c8d; margin: 10px 0; text-transform: capitalize; }

        .placa-hoy {
            font-size: 4rem;
            font-weight: bold;
            padding: 1rem;
            border-radius: 15px;
            margin: 15px 0;
            color: white;
        }

        .bg-01 { background: var(--green); }
        .bg-23 { background: var(--brown); }
        .bg-45 { background: var(--red); }
        .bg-67 { background: var(--yellow); color:#333;}
        .bg-89 { background: var(--blue); }

        .bg-libre {
            background: #fff;
            color: #000;
            border: 2px solid var(--primary);
        }

        .dia-fila {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
        }

        .mini-placa {
            padding: 5px 10px;
            border-radius: 6px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Pico y Placa Pasto</h1>
    <div id="fecha-hoy" class="fecha-hoy"></div>

    <div id="placa-hoy-box" class="placa-hoy">--</div>

    <h3>Próximos días</h3>
    <div id="lista"></div>
</div>

<script>
const secuencia = [
    { texto: "0 - 1", clase: "bg-01" },
    { texto: "2 - 3", clase: "bg-23" },
    { texto: "4 - 5", clase: "bg-45" },
    { texto: "6 - 7", clase: "bg-67" },
    { texto: "8 - 9", clase: "bg-89" }
];

// Festivos Colombia 2026
const festivos = [
"2026-01-01","2026-01-12","2026-03-23","2026-04-02","2026-04-03",
"2026-05-01","2026-05-18","2026-06-08","2026-06-15","2026-06-29",
"2026-07-20","2026-08-07","2026-08-17","2026-10-12","2026-11-02",
"2026-11-16","2026-12-08","2026-12-25"
];

// 🔥 FECHA BASE REAL (1 ENERO 2026)
const fechaBase = new Date(2026, 0, 1);

function obtenerPicoPlaca(fecha) {

    let f = new Date(fecha.getFullYear(), fecha.getMonth(), fecha.getDate(), 12);

    let dia = f.getDay();
    let iso = f.toISOString().split('T')[0];

    // Fin de semana o festivo
    if (dia === 0 || dia === 6 || festivos.includes(iso)) {
        return { texto: "LIBRE", clase: "bg-libre" };
    }

    // Diferencia en días
    let diff = Math.floor((f - fechaBase) / (1000 * 60 * 60 * 24));

    let indice = diff % 5;
    if (indice < 0) indice += 5;

    return secuencia[indice];
}

function render() {

    let hoy = new Date();

    document.getElementById("fecha-hoy").innerText =
        hoy.toLocaleDateString("es-CO", {
            weekday: "long",
            day: "numeric",
            month: "long"
        });

    let infoHoy = obtenerPicoPlaca(hoy);

    let box = document.getElementById("placa-hoy-box");
    box.innerText = infoHoy.texto;
    box.className = "placa-hoy " + infoHoy.clase;

    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    for (let i = 1; i <= 15; i++) {
        let f = new Date();
        f.setDate(hoy.getDate() + i);

        let info = obtenerPicoPlaca(f);

        let div = document.createElement("div");
        div.className = "dia-fila";

        div.innerHTML = `
            <span>${f.toLocaleDateString("es-CO", {
                weekday: "short",
                day: "numeric",
                month: "short"
            })}</span>
            <span class="mini-placa ${info.clase}">
                ${info.texto}
            </span>
        `;

        lista.appendChild(div);
    }
}

render();
</script>

</body>
</html>
