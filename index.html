<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pico y Placa Pasto 2026 - Rotación Dinámica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Definición de colores según base de datos */
        .verde { background-color: #00a651; color: white; }
        .gris { background-color: #333333; color: white; } /* Representa Blanco/Gris (2-3 o Sin Restricción) */
        .rojo { background-color: #ed1c24; color: white; }
        .amarillo { background-color: #fff200; color: black; }
        .azul { background-color: #00aeef; color: white; }
        
        .day-cell {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.85rem;
            border-radius: 4px;
            transition: transform 0.2s;
        }
        .day-cell:hover { transform: scale(1.1); z-index: 10; }
        .header-mes {
            background: linear-gradient(90deg, #1e3a8a, #3b82f6);
            color: white;
            text-align: center;
            font-weight: 900;
            padding: 8px;
            border-radius: 8px 8px 0 0;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-12">

    <!-- SECCIÓN INTERACTIVA (ESTILO PYPHOY) -->
    <header class="bg-white shadow-xl sticky top-0 z-50 mb-8 border-b-4 border-blue-600">
        <div class="max-w-6xl mx-auto p-4 flex flex-col md:flex-row items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-black text-slate-800">Pico y Placa <span class="text-blue-600">Pasto 2026</span></h1>
                <p class="text-slate-500 font-bold uppercase text-sm tracking-tighter" id="display-fecha"></p>
            </div>
            
            <div class="bg-slate-800 p-4 rounded-2xl flex items-center gap-4 border-4 border-slate-700 shadow-inner">
                <label class="text-white font-black text-sm">DÍGITO DE PLACA:</label>
                <select id="select-placa" onchange="actualizarEstado()" class="text-3xl font-black px-4 py-1 rounded-xl bg-blue-600 text-white outline-none cursor-pointer hover:bg-blue-500 transition-colors">
                    <option value="0">0</option><option value="1">1</option><option value="2">2</option>
                    <option value="3">3</option><option value="4">4</option><option value="5">5</option>
                    <option value="6">6</option><option value="7">7</option><option value="8">8</option>
                    <option value="9">9</option>
                </select>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4">
        <!-- ESTADO ACTUAL (Lógica de rotación semanal) -->
        <div id="status-card" class="bg-white rounded-3xl p-8 text-center shadow-2xl mb-12 transform transition-all">
            <h2 id="status-titulo" class="text-4xl font-black mb-2">VERIFICANDO...</h2>
            <p id="status-desc" class="text-slate-600 text-xl font-medium"></p>
        </div>

        <!-- LEYENDA ROTATIVA -->
        <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-12">
            <div class="verde p-3 rounded-xl shadow-md text-center font-black">0 - 1</div>
            <div class="gris p-3 rounded-xl shadow-md text-center font-black">2 - 3</div>
            <div class="rojo p-3 rounded-xl shadow-md text-center font-black">4 - 5</div>
            <div class="amarillo p-3 rounded-xl shadow-md text-center font-black">6 - 7</div>
            <div class="azul p-3 rounded-xl shadow-md text-center font-black">8 - 9</div>
        </div>

        <!-- CONTENEDOR DE MESES -->
        <div id="calendario-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Inyección vía JavaScript -->
        </div>
    </main>

    <script>
        // Mapeo de colores basado en tu documento
        const COLOR_MAP = {
            "v": { class: "verde", digits: [0, 1] },
            "g": { class: "gris", digits: [2, 3] },
            "r": { class: "rojo", digits: [4, 5] },
            "a": { class: "amarillo", digits: [6, 7] },
            "z": { class: "azul", digits: [8, 9] }
        };

        // Estructura de datos según la rotación semanal descrita
        const rawData2026 = {
            "Enero": { offset: 4, days: ["v","v","v","g","r","a","z","v","g","g","g","z","v","g","r","a","g","g","v","z","g","r","a","g","g","v","g","r","a","z","g"] },
            "Febrero": { offset: 0, days: ["g","g","r","a","z","v","g","g","r","a","z","v","g","g","g","z","v","g","r","a","g","g","v","g","r","a","z","g"] },
            "Marzo": { offset: 0, days: ["g","g","r","a","z","v","g","g","g","r","a","z","v","g","g","r","a","z","v","g","g","g","z","v","g","g","r","g","g","z","v"] }
            // Se puede extender siguiendo la rotación de la base de datos[cite: 1]
        };

        function generarCalendario() {
            const container = document.getElementById('calendario-grid');
            container.innerHTML = "";

            for (const [nombre, data] of Object.entries(rawData2026)) {
                let html = `
                <div class="bg-white rounded-2xl shadow-lg overflow-hidden border border-slate-200">
                    <div class="header-mes">${nombre}</div>
                    <div class="p-4">
                        <div class="grid grid-cols-7 gap-1 text-center text-[10px] font-bold text-slate-400 mb-2 uppercase tracking-tighter">
                            <div>Dom</div><div>Lun</div><div>Mar</div><div>Mie</div><div>Jue</div><div>Vie</div><div>Sab</div>
                        </div>
                        <div class="grid grid-cols-7 gap-1">`;
                
                // Celdas vacías (offset del mes)
                for (let i = 0; i < data.offset; i++) {
                    html += `<div class="bg-slate-50 border border-slate-100 rounded"></div>`;
                }

                // Celdas de días con rotación
                data.days.forEach((code, i) => {
                    const config = COLOR_MAP[code];
                    html += `<div class="day-cell ${config.class}">${i + 1}</div>`;
                });

                html += `</div></div></div>`;
                container.innerHTML += html;
            }
        }

        function actualizarEstado() {
            const digit = parseInt(document.getElementById('select-placa').value);
            const statusCard = document.getElementById('status-card');
            const statusTitulo = document.getElementById('status-titulo');
            const statusDesc = document.getElementById('status-desc');

            // Simulación de lógica de hoy (Mayo 2026 en este ejemplo)[cite: 1]
            // Basado en tu DB: Si hoy es lunes y toca azul (8-9), se restringe.
            const hoyEsRestringido = (digit === 8 || digit === 9); // Ejemplo dinámico

            if (hoyEsRestringido) {
                statusCard.className = "bg-red-600 rounded-3xl p-8 text-center shadow-2xl mb-12 text-white scale-105";
                statusTitulo.innerText = "TIENES RESTRICCIÓN";
                statusDesc.innerText = "Hoy tu vehículo debe quedarse en casa (07:30 AM - 07:30 PM)";
            } else {
                statusCard.className = "bg-emerald-500 rounded-3xl p-8 text-center shadow-2xl mb-12 text-white";
                statusTitulo.innerText = "PUEDES CIRCULAR";
                statusDesc.innerText = "Tu placa no tiene restricciones de movilidad para el día de hoy.";
            }
        }

        // Inicialización
        document.getElementById('display-fecha').innerText = new Intl.DateTimeFormat('es-CO', { dateStyle: 'full' }).format(new Date());
        generarCalendario();
        actualizarEstado();
    </script>
</body>
</html>
