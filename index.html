<script>
    const secuenciaBase = [
        { texto: "0 - 1", clase: "bg-01" },
        { texto: "2 - 3", clase: "bg-23" },
        { texto: "4 - 5", clase: "bg-45" },
        { texto: "6 - 7", clase: "bg-67" },
        { texto: "8 - 9", clase: "bg-89" }
    ];

    // Se incluyó el 2026-05-01 explícitamente
    const festivos = [
        "2026-01-01", "2026-01-06", "2026-03-23", "2026-04-02", 
        "2026-04-03", "2026-05-01", "2026-05-18", "2026-06-08", 
        "2026-06-15", "2026-06-29", "2026-07-20", "2026-08-07"
    ];

    function getWeekNumber(d) {
        d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
        var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
        return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    }

    function obtenerInfo(fecha) {
        const diaSemana = fecha.getDay(); // 0: Dom, 1: Lun...
        
        // Ajuste para obtener la fecha local en formato YYYY-MM-DD
        const anio = fecha.getFullYear();
        const mes = String(fecha.getMonth() + 1).padStart(2, '0');
        const dia = String(fecha.getDate()).padStart(2, '0');
        const fechaISO = `${anio}-${mes}-${dia}`;
        
        // 1. Validar Fines de Semana y Festivos
        if (diaSemana === 0 || diaSemana === 6 || festivos.includes(fechaISO)) {
            return { texto: "No aplica", clase: "bg-libre" };
        }

        // 2. Lógica de Rotación
        const semana = getWeekNumber(fecha);
        
        // AJUSTE DINÁMICO: 
        // Para que la semana 18 (Abril 27 - Mayo 3) el lunes sea 6-7 (Indice 3)
        let indiceLunes = (semana - 15) % 5; 
        if (indiceLunes < 0) indiceLunes += 5;

        let indiceDia = (indiceLunes + (diaSemana - 1)) % 5;
        return secuenciaBase[indiceDia];
    }

    function render() {
        const hoy = new Date(); 
        document.getElementById('fecha-hoy').innerText = hoy.toLocaleDateString('es-CO', { weekday: 'long', day: 'numeric', month: 'long' });
        
        const infoHoy = obtenerInfo(hoy);
        const box = document.getElementById('placa-hoy-box');
        box.innerText = infoHoy.texto; 
        box.className = "placa-hoy " + infoHoy.clase;

        const lista = document.getElementById('lista-futura');
        lista.innerHTML = "";
        
        // Generar próximos 30 días
        for (let i = 1; i <= 30; i++) {
            let f = new Date();
            f.setDate(hoy.getDate() + i);
            
            let info = obtenerInfo(f);
            let fila = document.createElement('div');
            fila.className = 'dia-fila';
            fila.innerHTML = `
                <span style="text-transform: capitalize;">
                    ${f.toLocaleDateString('es-CO', {weekday:'short', day:'numeric', month:'short'})}
                </span>
                <span class="mini-placa ${info.clase}">${info.texto}</span>
            `;
            lista.appendChild(fila);
        }
    }
    render();
</script>
