<!DOCTYPE html>
<html lang="es">
   <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="850GuJ-pa0K1a5sO7-e0X8ImMfZCx_ONTNKR6dUIAMw" /> 
    <title>Pico y Placa Pasto 2026 - Consulta Hoy y Calendario Completo</title>
    <meta name="description" content="Consulta el Pico y Placa en Pasto para hoy. Calendario actualizado 2026 con rotación semanal para particulares, motos y taxis. Horarios y festivos.">
    <meta name="keywords" content="Pico y Placa Pasto, Pasto 2026, restricción vehicular Pasto, transito Pasto hoy">
    <link rel="canonical" href="https://madwolfskar-arch.github.io/pico-y-placa-pasto-2026/" />

    <style>
        :root {
            --primary: #2c3e50;
            --green: #27ae60; --brown: #6e4b3a; --red: #e74c3c; --yellow: #f1c40f; --blue: #3498db;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 420px; text-align: center; }
        
        h1 { margin: 0; font-size: 1.6rem; color: var(--primary); }
        .fecha-hoy { color: #7f8c8d; margin: 5px 0; font-size: 1.1rem; text-transform: capitalize; }
        
        /* Reloj */
        .reloj { font-size: 1.5rem; font-weight: bold; color: var(--primary); margin: 10px 0; font-family: 'Courier New', Courier, monospace; }
        .estado-horario { font-size: 0.9rem; font-weight: bold; padding: 5px 15px; border-radius: 20px; display: inline-block; margin-bottom: 10px; }
        .activo { background-color: #d4efdf; color: #145a32; }
        .inactivo { background-color: #ebedef; color: #566573; }

        .placa-hoy { font-size: 5rem; font-weight: bold; padding: 1.2rem; border-radius: 15px; margin: 10px 0; color: white; text-shadow: 1px 1px 3px rgba(0,0,0,0.3); display: block; }
        
        .bg-01 { background-color: var(--green); }
        .bg-23 { background-color: var(--brown); color: white; }
        .bg-45 { background-color: var(--red); }
        .bg-67 { background-color: var(--yellow); color: #333; }
        .bg-89 { background-color: var(--blue); }
        .bg-libre { background-color: #ffffff !important; color: #000000 !important; border: 3px solid var(--primary) !important; text-shadow: none !important; }
        
        .proximos-dias { margin-top: 25px; text-align: left; }
        h2 { font-size: 1.2rem; border-bottom: 2px solid #eee; padding-bottom: 8px; color: var(--primary); }
        .dia-fila { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f9f9f9; }
        .mini-placa { padding: 4px 12px; border-radius: 6px; font-weight: bold; font-size: 0.85rem; min-width: 60px; text-align: center; }
        .footer { margin-top: 20px; font-size: 0.75rem; color: #bdc3c7; line-height: 1.4; }
    </style>
</head>
    <body>
    <div class="card">
        <h1>Pico y Placa Pasto</h1>
        <div id="fecha-hoy" class="fecha-hoy">Cargando...</div>
        
        <div id="reloj" class="reloj">00:00:00</div>
        <div id="estado" class="estado-horario">Calculando...</div>

        <p style="margin:0; font-weight: 500;">Restricción hoy:</p>
        <div id="placa-hoy-box" class="placa-hoy">--</div>

        <div class="proximos-dias">
            <h2>Próximos 30 Días</h2>
            <div id="lista-futura"></div>
        </div>

        <div class="footer">
            <p>Horario: 7:30 AM a 7:00 PM<br>Basado en Rotación Semanal 2026<br>Actualización Automática</p>
        </div>
    </div>

    <script>
        const secuenciaBase = [
            { texto: "0 - 1", clase: "bg-01" },
            { texto: "2 - 3", clase: "bg-23" },
            { texto: "4 - 5", clase: "bg-45" },
            { texto: "6 - 7", clase: "bg-67" },
            { texto: "8 - 9", clase: "bg-89" }
        ];

        const festivos = ["2026-03-23", "2026-04-02", "2026-04-03", "2026-05-01", "2026-05-18", "2026-06-08", "2026-06-15", "2026-06-29", "2026-07-20", "2026-08-07", "2026-08-17", "2026-10-12", "2026-11-02", "2026-11-16", "2026-12-08", "2026-12-25"];

        function getWeekNumber(d) {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
            var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }

        function obtenerInfo(fecha) {
            const diaSemana = fecha.getDay(); 
            const fechaISO = fecha.toISOString().split('T')[0];
            if (diaSemana === 0 || diaSemana === 6 || festivos.includes(fechaISO)) {
                return { texto: "LIBRE", clase: "bg-libre" };
            }
            const semana = getWeekNumber(fecha);
            let indiceLunes = (semana - 10) % 5; 
            if (indiceLunes < 0) indiceLunes += 5;
            let indiceDia = (indiceLunes + (diaSemana - 1)) % 5;
            return secuenciaBase[indiceDia];
        }

        function actualizarReloj() {
            const ahora = new Date();
            const horas = ahora.getHours();
            const minutos = ahora.getMinutes();
            
            // Formatear reloj
            document.getElementById('reloj').innerText = ahora.toLocaleTimeString('es-CO');

            // Lógica de estado (7:30 AM a 7:00 PM)
            const estadoDiv = document.getElementById('estado');
            const totalMinutos = (horas * 60) + minutos;
            const inicio = (7 * 60) + 30; // 7:30
            const fin = 19 * 60; // 19:00

            const infoHoy = obtenerInfo(ahora);

            if (totalMinutos >= inicio && totalMinutos < fin && infoHoy.texto !== "LIBRE") {
                estadoDiv.innerText = "🟢 RESTRICCIÓN ACTIVA";
                estadoDiv.className = "estado-horario activo";
            } else {
                estadoDiv.innerText = "⚪ FUERA DE HORARIO";
                estadoDiv.className = "estado-horario inactivo";
            }
        }

        function render() {
            const hoy = new Date(); 
            document.getElementById('fecha-hoy').innerText = hoy.toLocaleDateString('es-CO', { weekday: 'long', day: 'numeric', month: 'long' });
            
            const infoHoy = obtenerInfo(hoy);
            const box = document.getElementById('placa-hoy-box');
            box.innerText = infoHoy.texto; 
            box.className = "placa-hoy " + infoHoy.clase;

            const lista = document.getElementById('lista-futura');
            lista.innerHTML = "";
            for (let i = 1; i <= 30; i++) {
                let f = new Date(); f.setDate(hoy.getDate() + i);
                let info = obtenerInfo(f);
                let fila = document.createElement('div');
                fila.className = 'dia-fila';
                fila.innerHTML = `<span style="text-transform: capitalize;">${f.toLocaleDateString('es-CO', {weekday:'short', day:'numeric', month:'short'})}</span><span class="mini-placa ${info.clase}">${info.texto}</span>`;
                lista.appendChild(fila);
            }
        }

        setInterval(actualizarReloj, 1000);
        actualizarReloj();
        render();
    </script>
</body>
</html>
