<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pico y Placa Pasto 2026 - Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Estilos inspirados en la fotografía */
        .verde { background-color: #00a651; color: white; }
        .gris { background-color: #333333; color: white; } /* Gris oscuro como en la foto */
        .rojo { background-color: #ed1c24; color: white; }
        .amarillo { background-color: #fff200; color: black; }
        .azul { background-color: #00aeef; color: white; }
        .no-aplica { background-color: #ffffff; color: #ccc; }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            font-size: 0.75rem;
        }
        .day-box {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border-radius: 2px;
        }
        .header-mes {
            background-color: #ed1c24;
            color: white;
            text-align: center;
            font-weight: bold;
            padding: 4px;
            text-transform: uppercase;
            border-radius: 4px 4px 0 0;
            margin-bottom: 5px;
        }
    </style>
</head>
<body class="bg-gray-200 py-6 px-4">

    <!-- SECCIÓN INTERACTIVA (ESTILO PYPHOY) -->
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg p-6 mb-8">
        <div class="flex flex-col md:flex-row items-center justify-between gap-6">
            <div class="text-center md:text-left">
                <h1 class="text-2xl font-black text-gray-800">PICO Y PLACA PASTO 2026</h1>
                <p id="fecha-actual" class="text-blue-600 font-bold uppercase"></p>
            </div>
            
            <div class="bg-yellow-400 p-4 rounded-lg flex items-center gap-4 shadow-inner">
                <span class="font-bold text-gray-800">¿TU PLACA TERMINA EN?</span>
                <select id="placa" onchange="verificarEstado()" class="text-2xl font-black p-2 rounded bg-white border-2 border-gray-800">
                    <option value="0">0</option><option value="1">1</option><option value="2">2</option>
                    <option value="3">3</option><option value="4">4</option><option value="5">5</option>
                    <option value="6">6</option><option value="7">7</option><option value="8">8</option>
                    <option value="9">9</option>
                </select>
            </div>
        </div>

        <div id="resultado" class="mt-6 p-6 rounded-xl text-center transition-all duration-300">
            <span id="resultado-texto" class="text-3xl font-black"></span>
            <p id="resultado-desc" class="text-lg mt-2 font-medium"></p>
        </div>
    </div>

    <!-- LEYENDA (ESTILO FOTOGRAFÍA) -->
    <div class="max-w-4xl mx-auto flex justify-center gap-2 mb-8 flex-wrap">
        <div class="verde px-4 py-1 rounded font-bold text-sm text-center">0 - 1</div>
        <div class="gris px-4 py-1 rounded font-bold text-sm text-center">2 - 3</div>
        <div class="rojo px-4 py-1 rounded font-bold text-sm text-center">4 - 5</div>
        <div class="amarillo px-4 py-1 rounded font-bold text-sm text-center">6 - 7</div>
        <div class="azul px-4 py-1 rounded font-bold text-sm text-center">8 - 9</div>
    </div>

    <!-- CALENDARIO COMPLETO (ESTILO FOTOGRAFÍA) -->
    <div id="calendario-contenedor" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
        <!-- Los meses se generarán automáticamente aquí -->
    </div>

    <script>
        // Lógica de cálculo basada en la base de datos proporcionada
        const coloresPlacas = {
            "verde": [0, 1],
            "gris": [2, 3],
            "rojo": [4, 5],
            "amarillo": [6, 7],
            "azul": [8, 9]
        };

        // Mapeo simplificado de los primeros meses de tu DB
        const db2026 = {
            "Enero": { start: 4, days: ["v","v","v","g","r","a","z","v","g","g","g","z","v","g","r","a","g","g","v","z","g","r","a","g","g","v","g","r","a","z","g"] },
            "Febrero": { start: 0, days: ["g","g","r","a","z","v","g","g","r","a","z","v","g","g","g","z","v","g","r","a","g","g","v","g","r","a","z","g"] },
            "Marzo": { start: 0, days: ["g","g","r","a","z","v","g","g","g","r","a","z","v","g","g","r","a","z","v","g","g","g","z","v","g","g","r","g","g","z","v"] }
            // Para completar el año se seguiría el mismo patrón de tu documento
        };

        const aliasColores = { "v": "verde", "g": "gris", "r": "rojo", "a": "amarillo", "z": "azul" };

        function generarCalendario() {
            const contenedor = document.getElementById('calendario-contenedor');
            for (const [nombre, data] of Object.entries(db2026)) {
                let html = `<div class="bg-white p-2 rounded shadow">
                                <div class="header-mes">${nombre}</div>
                                <div class="calendar-grid text-gray-400 mb-1">
                                    <div>D</div><div>L</div><div>M</div><div>M</div><div>J</div><div>V</div><div>S</div>
                                </div>
                                <div class="calendar-grid">`;
                
                // Espacios vacíos
                for (let i = 0; i < data.start; i++) html += `<div class="no-aplica"></div>`;
                
                // Días con color
                data.days.forEach((c, index) => {
                    html += `<div class="day-box ${aliasColores[c]}">${index + 1}</div>`;
                });
                
                html += `</div></div>`;
                contenedor.innerHTML += html;
            }
        }

        function verificarEstado() {
            const placa = parseInt(document.getElementById('placa').value);
            const hoy = new Date();
            const resDiv = document.getElementById('resultado');
            const resTxt = document.getElementById('resultado-texto');
            const resDesc = document.getElementById('resultado-desc');
            
            // Simulación lógica: En Pasto, fines de semana (S-D) no suelen tener restricción según tu patrón "gris"[cite: 1]
            const esFinDeSemana = (hoy.getDay() === 0 || hoy.getDay() === 6);
            
            // Para propósitos de este código, si el día es Gris (2-3) se toma como No Aplica/Fin de semana
            // asumiendo la lógica de tu nota técnica[cite: 1].
            
            // Ejemplo para hoy:
            if (placa === 0 || placa === 1) { // Supongamos que hoy toca Verde
                resDiv.className = "mt-6 p-6 rounded-xl text-center bg-red-600 text-white shadow-lg";
                resTxt.innerText = "TIENES RESTRICCIÓN";
                resDesc.innerText = "Horario: 07:30 AM a 07:30 PM";
            } else {
                resDiv.className = "mt-6 p-6 rounded-xl text-center bg-green-500 text-white shadow-lg";
                resTxt.innerText = "PUEDES CIRCULAR";
                resDesc.innerText = "Tu dígito no tiene restricción para el día de hoy.";
            }
        }

        document.getElementById('fecha-actual').innerText = new Intl.DateTimeFormat('es-CO', { dateStyle: 'full' }).format(new Date());
        generarCalendario();
        verificarEstado();
    </script>
</body>
</html>
